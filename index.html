    .stat-pill-label { font-size: 9px !important; }
    .content-container { padding: 12px 14px 30px !important; }
    .tab-btn { padding: 6px 9px !important; font-size: 12px !important; }
    .section-title { font-size: 12px !important; margin-bottom: 6px !important; }
    .entry-card { padding: 10px 12px !important; gap: 8px !important; }
    .modal-overlay { padding: 8px !important; align-items: flex-end !important; }
    .modal-box { padding: 16px !important; max-height: 94vh !important; border-radius: 16px 16px 0 0 !important; }
    .add-title-btn { padding: 8px 12px !important; font-size: 12px !important; }
    .footer-note { font-size: 9px !important; margin-top: 20px !important; }
    .home-stats-row { gap: 8px !important; }
    .new-ep-card { padding: 9px !important; gap: 8px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-source">

const { useState, useEffect, useCallback } = React;

/* Local storage shim - replaces the Claude-artifact-only storage API
   so this app works as a normal standalone site (e.g. on GitHub Pages). */
const storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
};

const ENTRIES_KEY = "tv-tracker-entries-v4";
const HISTORY_KEY = "tv-tracker-history-v4";
const APIKEY_KEY = "tv-tracker-tmdb-key-v4";

const STATUS_META = {
  Watching:  { color: "#58A6FF", bg: "rgba(88,166,255,0.13)",  icon: "▶" },
  Watchlist: { color: "#E5A000", bg: "rgba(229,160,0,0.13)",   icon: "🔖" },
  Completed: { color: "#3FB950", bg: "rgba(63,185,80,0.13)",   icon: "✓" },
  Dropped:   { color: "#F85149", bg: "rgba(248,81,73,0.13)",   icon: "✕" },
};

const GENRE_OPTIONS = [
  "Action", "Comedy", "Drama", "Horror", "Sci-Fi",
  "Thriller", "Romance", "Documentary", "Anime", "Fantasy", "Mystery", "Other",
];

const POSTER_BASE = "https://image.tmdb.org/t/p/w185";
const TMDB_BASE = "https://api.themoviedb.org/3";

function defaultForm() {
  return {
    title: "", type: "TV Show", status: "Watchlist", rating: "", genre: "", notes: "",
    tmdbId: null, imdbId: null, posterPath: null,
    watchedEpisodes: {}, latestSeasonCache: null,
  };
}

function todayISO() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

async function tmdbFetch(path, apiKey) {
  const sep = path.includes("?") ? "&" : "?";
  const res = await fetch(`${TMDB_BASE}${path}${sep}api_key=${apiKey}`);
  if (!res.ok) {
    if (res.status === 401) throw new Error("Invalid TMDB API key");
    throw new Error("TMDB request failed");
  }
  return res.json();
}

async function searchTMDB(query, type, apiKey) {
  const endpoint = type === "Movie" ? "search/movie" : "search/tv";
  const data = await tmdbFetch(`/${endpoint}?query=${encodeURIComponent(query)}`, apiKey);
  return data.results || [];
}

async function getExternalIds(id, type, apiKey) {
  const kind = type === "Movie" ? "movie" : "tv";
  const data = await tmdbFetch(`/${kind}/${id}/external_ids`, apiKey);
  return data.imdb_id || null;
}

async function getTVDetails(id, apiKey) {
  return tmdbFetch(`/tv/${id}`, apiKey);
}

async function getSeasonEpisodes(id, seasonNumber, apiKey) {
  const data = await tmdbFetch(`/tv/${id}/season/${seasonNumber}`, apiKey);
  return data.episodes || [];
}

function StarRating({ value, onChange, readonly }) {
  return (
    <div style={{ display: "flex", gap: 4 }}>
      {[1,2,3,4,5].map(n => (
        <span
          key={n}
          onClick={() => !readonly && onChange(n === Number(value) ? "" : String(n))}
          style={{
            fontSize: readonly ? 14 : 20,
            cursor: readonly ? "default" : "pointer",
            color: n <= Number(value) ? "#E5A000" : "#30363D",
            transition: "color 0.15s",
          }}
        >★</span>
      ))}
    </div>
  );
}

function Badge({ status }) {
  const m = STATUS_META[status];
  return (
    <span style={{
      background: m.bg, color: m.color, border: `1px solid ${m.color}33`,
      borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600,
      letterSpacing: "0.04em", textTransform: "uppercase",
    }}>
      {m.icon} {status}
    </span>
  );
}

function ImdbLink({ imdbId }) {
  if (!imdbId) return null;
  return (
    <a
      href={`https://www.imdb.com/title/${imdbId}/`}
      target="_blank"
      rel="noreferrer"
      onClick={e => e.stopPropagation()}
      style={{
        display: "inline-flex", alignItems: "center", gap: 4,
        background: "#F5C518", color: "#000", fontWeight: 800, fontSize: 10,
        borderRadius: 4, padding: "2px 6px", textDecoration: "none",
        letterSpacing: "0.02em",
      }}
    >IMDb ↗</a>
  );
}

function Poster({ path, type, size = 46 }) {
  if (path) {
    return (
      <img src={`${POSTER_BASE}${path}`} alt="" style={{
        width: size, height: size * 1.5, objectFit: "cover", borderRadius: 6,
        flexShrink: 0, background: "#0D1117",
      }} />
    );
  }
  return (
    <div style={{
      width: size, height: size * 1.5, borderRadius: 6, background: "#21262D",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.4, flexShrink: 0,
    }}>{type === "Movie" ? "🎬" : "📺"}</div>
  );
}

/* ---------------- Settings Modal ---------------- */
function SettingsModal({ apiKey, onSave, onClose }) {
  const [key, setKey] = useState(apiKey || "");
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 110,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }} onClick={onClose}>
      <div style={{
        background: "#161B22", border: "1px solid #30363D", borderRadius: 16,
        padding: 28, width: "100%", maxWidth: 440,
      }} onClick={e => e.stopPropagation()}>
        <h2 style={{ margin: "0 0 6px", color: "#F0F6FC", fontSize: 18, fontWeight: 700 }}>TMDB API Key</h2>
        <p style={{ margin: "0 0 16px", color: "#8B949E", fontSize: 13, lineHeight: 1.5 }}>
          Used to search titles, pull posters, link IMDb pages, and check for new episodes.
          Free for non-commercial use. Get a key at{" "}
          <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noreferrer"
            style={{ color: "#58A6FF" }}>themoviedb.org/settings/api</a>.
          Your key is stored only in this app.
        </p>
        <input
          value={key}
          onChange={e => setKey(e.target.value)}
          placeholder="Paste your TMDB API key (v3 auth)"
          style={{
            width: "100%", background: "#0D1117", border: "1px solid #30363D",
            borderRadius: 8, color: "#F0F6FC", padding: "10px 12px", fontSize: 13,
            outline: "none", boxSizing: "border-box", marginBottom: 18, fontFamily: "monospace",
          }}
        />
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={{
            background: "none", border: "1px solid #30363D", color: "#8B949E",
            borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer",
          }}>Cancel</button>
          <button onClick={() => onSave(key.trim())} style={{
            background: "#E5A000", border: "none", color: "#0D1117",
            borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer",
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Episode Browser (inside edit modal) ---------------- */
function EpisodeBrowser({ entry, apiKey, onToggleEpisode, onBulkMarkWatched, onLatestSeasonData }) {
  const [seasonCount, setSeasonCount] = useState(null);
  const [seasonsMeta, setSeasonsMeta] = useState([]);
  const [season, setSeason] = useState(1);
  const [episodes, setEpisodes] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const details = await getTVDetails(entry.tmdbId, apiKey);
        if (cancelled) return;
        setSeasonCount(details.number_of_seasons || 1);
        setSeason(details.number_of_seasons || 1);
        setSeasonsMeta((details.seasons || []).filter(s => s.season_number > 0));
      } catch (e) {
        if (!cancelled) setError(e.message);
      }
    })();
    return () => { cancelled = true; };
  }, [entry.tmdbId, apiKey]);

  useEffect(() => {
    if (!season) return;
    let cancelled = false;
    setLoading(true);
    setError(null);
    (async () => {
      try {
        const eps = await getSeasonEpisodes(entry.tmdbId, season, apiKey);
        if (!cancelled) {
          setEpisodes(eps);
          if (seasonCount && season === seasonCount) {
            onLatestSeasonData(season, eps.map(ep => ({ episode_number: ep.episode_number, air_date: ep.air_date })));
          }
        }
      } catch (e) {
        if (!cancelled) setError(e.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [season, entry.tmdbId, apiKey, seasonCount]);

  const today = new Date();

  return (
    <div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
        <button onClick={() => {
          const aired = episodes.filter(ep => ep.air_date && new Date(ep.air_date) <= new Date());
          onBulkMarkWatched(aired.map(ep => ({ season, episode: ep.episode_number, name: ep.name, airDate: ep.air_date })));
        }} style={{
          background: "rgba(63,185,80,0.13)", border: "1px solid #3FB95055", color: "#3FB950",
          borderRadius: 7, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer",
        }}>Mark Season {season} Watched</button>

        {season > 1 && (
          <button onClick={() => {
            const toMark = [];
            seasonsMeta.filter(s => s.season_number < season).forEach(s => {
              for (let e = 1; e <= s.episode_count; e++) {
                toMark.push({ season: s.season_number, episode: e, name: null, airDate: null });
              }
            });
            onBulkMarkWatched(toMark);
          }} style={{
            background: "rgba(88,166,255,0.13)", border: "1px solid #58A6FF55", color: "#58A6FF",
            borderRadius: 7, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer",
          }}>Mark Seasons 1-{season - 1} Watched</button>
        )}
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <label style={{ fontSize: 12, color: "#8B949E", fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase" }}>
          Episodes
        </label>
        {seasonCount && (
          <select value={season} onChange={e => setSeason(Number(e.target.value))} style={{
            background: "#0D1117", border: "1px solid #30363D", borderRadius: 6,
            color: "#F0F6FC", padding: "4px 8px", fontSize: 12,
          }}>
            {Array.from({ length: seasonCount }, (_, i) => i + 1).map(s => (
              <option key={s} value={s}>Season {s}</option>
            ))}
          </select>
        )}
      </div>

      {error && <p style={{ color: "#F85149", fontSize: 12 }}>{error}</p>}
      {loading && <p style={{ color: "#8B949E", fontSize: 12 }}>Loading episodes...</p>}

      {!loading && !error && (
        <div style={{ maxHeight: 220, overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
          {episodes.map(ep => {
            const key = `S${season}E${ep.episode_number}`;
            const watched = !!entry.watchedEpisodes[key];
            const aired = ep.air_date && new Date(ep.air_date) <= today;
            return (
              <div key={key} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "6px 8px",
                borderRadius: 8, background: watched ? "rgba(63,185,80,0.08)" : "#0D1117",
                border: "1px solid #21262D",
              }}>
                <input
                  type="checkbox"
                  checked={watched}
                  disabled={!aired}
                  onChange={() => onToggleEpisode(season, ep.episode_number, ep.name, ep.air_date)}
                  style={{ width: 16, height: 16, cursor: aired ? "pointer" : "not-allowed", flexShrink: 0 }}
                />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, color: "#F0F6FC", fontWeight: 600,
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    E{ep.episode_number} · {ep.name || "Untitled"}
                  </div>
                  <div style={{ fontSize: 11, color: "#8B949E" }}>
                    {ep.air_date ? fmtDate(ep.air_date) : "No air date"}
                    {!aired && ep.air_date && <span style={{ color: "#E5A000" }}> · unaired</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------- Add/Edit Modal ---------------- */
function Modal({ entry, apiKey, onClose, onSave, onDelete }) {
  const [form, setForm] = useState(entry || defaultForm());
  const [mode, setMode] = useState(apiKey ? "search" : "manual"); // search | manual
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searchError, setSearchError] = useState(null);
  const isEdit = !!entry?.id;

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function runSearch() {
    if (!query.trim() || !apiKey) return;
    setSearching(true);
    setSearchError(null);
    try {
      const res = await searchTMDB(query.trim(), form.type, apiKey);
      setResults(res.slice(0, 8));
    } catch (e) {
      setSearchError(e.message);
    } finally {
      setSearching(false);
    }
  }

  async function selectResult(r) {
    const title = r.title || r.name;
    const posterPath = r.poster_path || null;
    set("title", title);
    set("tmdbId", r.id);
    set("posterPath", posterPath);
    setMode("manual"); // collapse search, show normal fields with linked data
    try {
      const imdbId = await getExternalIds(r.id, form.type, apiKey);
      setForm(f => ({ ...f, title, tmdbId: r.id, posterPath, imdbId }));
    } catch (_) { /* imdb link optional, ignore failure */ }
  }

  function toggleEpisode(season, episodeNum, name, airDate) {
    const key = `S${season}E${episodeNum}`;
    setForm(f => {
      const watchedEpisodes = { ...f.watchedEpisodes };
      const nowWatched = !watchedEpisodes[key];
      if (nowWatched) watchedEpisodes[key] = { watchedAt: todayISO(), name, airDate };
      else delete watchedEpisodes[key];
      return { ...f, watchedEpisodes };
    });
  }

  function bulkMarkWatched(episodeList) {
    setForm(f => {
      const watchedEpisodes = { ...f.watchedEpisodes };
      episodeList.forEach(({ season, episode, name, airDate }) => {
        const key = `S${season}E${episode}`;
        if (!watchedEpisodes[key]) watchedEpisodes[key] = { watchedAt: todayISO(), name, airDate };
      });
      return { ...f, watchedEpisodes };
    });
  }

  function updateLatestSeasonCache(season, episodes) {
    setForm(f => ({ ...f, latestSeasonCache: { season, episodes, fetchedAt: todayISO() } }));
  }

  const inputStyle = {
    width: "100%", background: "#0D1117", border: "1px solid #30363D",
    borderRadius: 8, color: "#F0F6FC", padding: "8px 12px", fontSize: 14,
    outline: "none", boxSizing: "border-box", fontFamily: "inherit",
  };
  const labelStyle = { fontSize: 12, color: "#8B949E", fontWeight: 600,
    letterSpacing: "0.05em", textTransform: "uppercase", display: "block", marginBottom: 6 };

  return (
    <div className="modal-overlay" style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 100,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }} onClick={onClose}>
      <div className="modal-box" style={{
        background: "#161B22", border: "1px solid #30363D", borderRadius: 16,
        padding: 28, width: "100%", maxWidth: 480, maxHeight: "90vh",
        overflowY: "auto", boxShadow: "0 24px 64px rgba(0,0,0,0.6)",
      }} onClick={e => e.stopPropagation()}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{ margin: 0, color: "#F0F6FC", fontSize: 18, fontWeight: 700 }}>
            {isEdit ? "Edit Entry" : "Add to List"}
          </h2>
          <button onClick={onClose} style={{
            background: "none", border: "none", color: "#8B949E",
            fontSize: 22, cursor: "pointer", lineHeight: 1, padding: 0,
          }}>×</button>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          <div>
            <label style={labelStyle}>Type</label>
            <select style={inputStyle} value={form.type} onChange={e => { set("type", e.target.value); setResults([]); }}>
              <option>TV Show</option>
              <option>Movie</option>
            </select>
          </div>

          {!isEdit && apiKey && mode === "search" && (
            <div>
              <label style={labelStyle}>Search TMDB</label>
              <div style={{ display: "flex", gap: 8 }}>
                <input style={inputStyle} placeholder="e.g. The Bear"
                  value={query} onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && runSearch()} autoFocus />
                <button onClick={runSearch} style={{
                  background: "#30363D", border: "none", color: "#F0F6FC",
                  borderRadius: 8, padding: "0 16px", fontSize: 13, cursor: "pointer", flexShrink: 0,
                }}>{searching ? "..." : "Search"}</button>
              </div>
              {searchError && <p style={{ color: "#F85149", fontSize: 12, marginTop: 6 }}>{searchError}</p>}
              {results.length > 0 && (
                <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6, maxHeight: 260, overflowY: "auto" }}>
                  {results.map(r => (
                    <div key={r.id} onClick={() => selectResult(r)} style={{
                      display: "flex", gap: 10, alignItems: "center", cursor: "pointer",
                      padding: 8, borderRadius: 8, background: "#0D1117", border: "1px solid #21262D",
                    }}>
                      <Poster path={r.poster_path} type={form.type} size={34} />
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 13, color: "#F0F6FC", fontWeight: 600,
                          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {r.title || r.name}
                        </div>
                        <div style={{ fontSize: 11, color: "#8B949E" }}>
                          {(r.release_date || r.first_air_date || "").slice(0, 4) || "Unknown year"}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <button onClick={() => setMode("manual")} style={{
                background: "none", border: "none", color: "#58A6FF", fontSize: 12,
                cursor: "pointer", marginTop: 10, padding: 0,
              }}>Enter details manually instead</button>
            </div>
          )}

          {(isEdit || mode === "manual" || !apiKey) && (
            <>
              <div>
                <label style={labelStyle}>Title</label>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  {form.posterPath && <Poster path={form.posterPath} type={form.type} size={30} />}
                  <input style={inputStyle} placeholder="e.g. The Bear" value={form.title}
                    onChange={e => set("title", e.target.value)} />
                </div>
                {form.imdbId && <div style={{ marginTop: 8 }}><ImdbLink imdbId={form.imdbId} /></div>}
                {!isEdit && apiKey && !form.tmdbId && (
                  <button onClick={() => setMode("search")} style={{
                    background: "none", border: "none", color: "#58A6FF", fontSize: 12,
                    cursor: "pointer", marginTop: 8, padding: 0,
                  }}>Search TMDB instead</button>
                )}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <label style={labelStyle}>Status</label>
                  <select style={inputStyle} value={form.status} onChange={e => set("status", e.target.value)}>
                    {Object.keys(STATUS_META).map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Genre</label>
                  <select style={inputStyle} value={form.genre} onChange={e => set("genre", e.target.value)}>
                    <option value="">--</option>
                    {GENRE_OPTIONS.map(g => <option key={g}>{g}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label style={labelStyle}>Rating</label>
                <StarRating value={form.rating} onChange={v => set("rating", v)} />
              </div>

              {form.type === "Movie" && (
                <button onClick={() => set("status", "Completed")} style={{
                  background: form.status === "Completed" ? "rgba(63,185,80,0.13)" : "#0D1117",
                  border: `1px solid ${form.status === "Completed" ? "#3FB950" : "#30363D"}`,
                  color: form.status === "Completed" ? "#3FB950" : "#F0F6FC",
                  borderRadius: 8, padding: "9px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer",
                }}>
                  {form.status === "Completed" ? "✓ Marked as Watched" : "Mark as Watched"}
                </button>
              )}

              {form.type === "TV Show" && form.tmdbId && apiKey && (
                <EpisodeBrowser entry={form} apiKey={apiKey} onToggleEpisode={toggleEpisode} onBulkMarkWatched={bulkMarkWatched} onLatestSeasonData={updateLatestSeasonCache} />
              )}

              <div>
                <label style={labelStyle}>Notes</label>
                <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 60 }}
                  placeholder="Thoughts, where you left off..."
                  value={form.notes} onChange={e => set("notes", e.target.value)} />
              </div>
            </>
          )}
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 24, justifyContent: "space-between" }}>
          {isEdit && (
            <button onClick={() => onDelete(entry.id)} style={{
              background: "rgba(248,81,73,0.12)", border: "1px solid #F8514933",
              color: "#F85149", borderRadius: 8, padding: "8px 16px",
              fontSize: 13, fontWeight: 600, cursor: "pointer",
            }}>Remove</button>
          )}
          <div style={{ display: "flex", gap: 10, marginLeft: "auto" }}>
            <button onClick={onClose} style={{
              background: "none", border: "1px solid #30363D", color: "#8B949E",
              borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer",
            }}>Cancel</button>
            <button onClick={() => form.title.trim() && onSave(form)} style={{
              background: form.title.trim() ? "#E5A000" : "#30363D",

            }}>
              {isEdit ? "Save Changes" : "Add to List"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function rebuildHistoryFromEntries(entries, history) {
  const existingKeys = new Set(
    history.map(h => `${h.entryId}-${h.season || ""}-${h.episode || ""}-${h.type}`)
  );
  const additions = [];

  entries.forEach(entry => {
    if (entry.type === "TV Show") {
      Object.entries(entry.watchedEpisodes || {}).forEach(([key, info]) => {
        const m = key.match(/^S(\d+)E(\d+)$/);
        const season = m ? m[1] : null;
        const episode = m ? m[2] : null;
        const dedupeKey = `${entry.id}-${season || ""}-${episode || ""}-TV Show`;
        if (!existingKeys.has(dedupeKey)) {
          additions.push({
            id: `${entry.id}-${key}-rebuild-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
            entryId: entry.id, title: entry.title, type: "TV Show",
            season, episode, name: (info && info.name) || null,
            posterPath: entry.posterPath, imdbId: entry.imdbId,
            watchedAt: (info && info.watchedAt) || entry.addedAt || todayISO(),
          });
          existingKeys.add(dedupeKey);
        }
      });
    } else if (entry.type === "Movie" && entry.status === "Completed") {
      const realKey = `${entry.id}-${""}-${""}-Movie`;
      if (!existingKeys.has(realKey)) {
        additions.push({
          id: `${entry.id}-movie-rebuild-${Date.now()}`,
          entryId: entry.id, title: entry.title, type: "Movie",
          posterPath: entry.posterPath, imdbId: entry.imdbId,
          watchedAt: entry.addedAt || todayISO(),
        });
        existingKeys.add(realKey);
      }
    }
  });

  return additions;
}

function isCaughtUpOnLatestSeason(entry) {
  const cache = entry.latestSeasonCache;
  if (!cache || !cache.episodes || cache.episodes.length === 0) return null;
  const today = new Date();
  const aired = cache.episodes.filter(ep => ep.air_date && new Date(ep.air_date) <= today);
  if (aired.length === 0) return null;
  return aired.every(ep => entry.watchedEpisodes && entry.watchedEpisodes[`S${cache.season}E${ep.episode_number}`]);
}

function applyAutoStatus(entry) {
  if (entry.type !== "TV Show") return entry;
  const caughtUp = isCaughtUpOnLatestSeason(entry);
  if (caughtUp === true && entry.status === "Watching") {
    return { ...entry, status: "Completed" };
  }
  if (caughtUp === false && entry.status === "Completed") {
    return { ...entry, status: "Watching" };
  }
  return entry;
}

/* ---------------- Main App ---------------- */
function TVTracker() {
  const [entries, setEntries] = useState([]);
  const [history, setHistory] = useState([]);
  const [apiKey, setApiKey] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("Home");
  const [libraryFilter, setLibraryFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [newEpisodes, setNewEpisodes] = useState([]);
  const [refreshing, setRefreshing] = useState(false);
  const [lastChecked, setLastChecked] = useState(null);
  const [syncMessage, setSyncMessage] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const [e, h, k] = await Promise.all([
          storage.get(ENTRIES_KEY).catch(() => null),
          storage.get(HISTORY_KEY).catch(() => null),
          storage.get(APIKEY_KEY).catch(() => null),
        ]);
        const loadedEntries = e?.value ? JSON.parse(e.value) : [];
        const loadedHistory = h?.value ? JSON.parse(h.value) : [];
        if (e?.value) setEntries(loadedEntries);
        if (h?.value) setHistory(loadedHistory);
        if (k?.value) setApiKey(k.value);

        const additions = rebuildHistoryFromEntries(loadedEntries, loadedHistory);
        if (additions.length) {
          const merged = [...additions, ...loadedHistory];
          setHistory(merged);
          try { await storage.set(HISTORY_KEY, JSON.stringify(merged)); } catch (_) {}
        }
      } catch (_) {}
      setLoaded(true);
    })();
  }, []);

  async function persistEntries(list) {
    setEntries(list);
    try { await storage.set(ENTRIES_KEY, JSON.stringify(list)); } catch (_) {}
  }
  async function persistHistory(list) {
    setHistory(list);
    try { await storage.set(HISTORY_KEY, JSON.stringify(list)); } catch (_) {}
  }
  async function saveApiKey(key) {
    setApiKey(key || null);
    try {
      if (key) await storage.set(APIKEY_KEY, key);
      else await storage.delete(APIKEY_KEY);
    } catch (_) {}
    setSettingsOpen(false);
  }

  function handleSave(form) {
    const prev = modal && modal.id ? entries.find(e => e.id === modal.id) : null;
    const entryId = prev ? prev.id : Date.now().toString();
    const prevWatched = (prev && prev.watchedEpisodes) || {};
    const newHistoryItems = [];

    Object.entries(form.watchedEpisodes || {}).forEach(([key, info]) => {
      if (!prevWatched[key]) {
        const m = key.match(/^S(\d+)E(\d+)$/);
        newHistoryItems.push({
          id: `${entryId}-${key}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          entryId, title: form.title, type: "TV Show",
          season: m ? m[1] : null, episode: m ? m[2] : null, name: info.name,
          posterPath: form.posterPath, imdbId: form.imdbId,
          watchedAt: info.watchedAt || todayISO(),
        });
      }
    });

    const removedKeys = Object.keys(prevWatched).filter(k => !(form.watchedEpisodes || {})[k]);
    let historyAfterRemoval = history;
    if (removedKeys.length) {
      const removedSet = new Set(removedKeys.map(k => {
        const m = k.match(/^S(\d+)E(\d+)$/);
        return `${entryId}-${m ? m[1] : ""}-${m ? m[2] : ""}`;
      }));
      historyAfterRemoval = history.filter(h => !removedSet.has(`${h.entryId}-${h.season}-${h.episode}`));
    }

    if (form.type === "Movie" && form.status === "Completed" && (!prev || prev.status !== "Completed")) {
      newHistoryItems.push({
        id: `${entryId}-movie-${Date.now()}`,
        entryId, title: form.title, type: "Movie",
        posterPath: form.posterPath, imdbId: form.imdbId, watchedAt: todayISO(),
      });
    }

    const finalEntry = applyAutoStatus(prev ? { ...form, id: modal.id, addedAt: modal.addedAt } : { ...form, id: entryId, addedAt: todayISO() });

    if (prev) {
      persistEntries(entries.map(e => e.id === modal.id ? finalEntry : e));
    } else {
      persistEntries([finalEntry, ...entries]);
    }
    if (newHistoryItems.length || removedKeys.length) persistHistory([...newHistoryItems, ...historyAfterRemoval]);
    setModal(null);
  }

  function syncHistory() {
    const additions = rebuildHistoryFromEntries(entries, history);
    if (additions.length) {
      persistHistory([...additions, ...history]);
      setSyncMessage(`Added ${additions.length} entr${additions.length === 1 ? "y" : "ies"}`);
    } else {
      setSyncMessage("Already up to date");
    }
    setTimeout(() => setSyncMessage(null), 4000);
  }

  function handleDelete(id) {
    persistEntries(entries.filter(e => e.id !== id));
    setModal(null);
  }

  const refreshNewEpisodes = useCallback(async () => {
    if (!apiKey) return;
    setRefreshing(true);
    const candidates = entries.filter(e =>
      e.type === "TV Show" && e.tmdbId &&
      (e.status === "Watching" || e.status === "Watchlist" || e.status === "Completed")
    );
    const found = [];
    let updatedEntries = [...entries];

    for (const entry of candidates) {
      try {
        const details = await getTVDetails(entry.tmdbId, apiKey);
        const latestSeason = details.number_of_seasons || 1;
        const eps = await getSeasonEpisodes(entry.tmdbId, latestSeason, apiKey);
        const today = new Date();
        eps.forEach(ep => {
          const key = `S${latestSeason}E${ep.episode_number}`;
          const aired = ep.air_date && new Date(ep.air_date) <= today;
          const watched = entry.watchedEpisodes && entry.watchedEpisodes[key];
          if (aired && !watched) {
            found.push({
              entryId: entry.id, key, title: entry.title, posterPath: entry.posterPath,
              season: latestSeason, episode: ep.episode_number, name: ep.name, airDate: ep.air_date,
              imdbId: entry.imdbId,
            });
          }
        });
        const idx = updatedEntries.findIndex(e => e.id === entry.id);
        if (idx !== -1) {
          const withCache = {
            ...updatedEntries[idx],
            latestSeasonCache: {
              season: latestSeason,
              episodes: eps.map(ep => ({ episode_number: ep.episode_number, air_date: ep.air_date })),
              fetchedAt: todayISO(),
            },
          };
          updatedEntries[idx] = applyAutoStatus(withCache);
        }
      } catch (_) { /* skip entries that fail to fetch */ }
    }

    found.sort((a, b) => new Date(b.airDate) - new Date(a.airDate));
    setNewEpisodes(found);
    persistEntries(updatedEntries);
    setLastChecked(todayISO());
    setRefreshing(false);
  }, [apiKey, entries]);

  useEffect(() => {
    if (loaded && apiKey && entries.length > 0 && newEpisodes.length === 0 && !lastChecked) {
      refreshNewEpisodes();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded, apiKey]);

  function markEpisodeWatchedFromHome(ep) {
    const updatedEntries = entries.map(e => {
      if (e.id !== ep.entryId) return e;
      const watchedEpisodes = { ...e.watchedEpisodes, [ep.key]: { watchedAt: todayISO(), name: ep.name, airDate: ep.airDate } };
      return applyAutoStatus({ ...e, watchedEpisodes });
    });
    persistEntries(updatedEntries);
    persistHistory([{
      id: `${ep.entryId}-${ep.key}-${Date.now()}`, entryId: ep.entryId, title: ep.title,
      type: "TV Show", season: ep.season, episode: ep.episode, name: ep.name,
      posterPath: ep.posterPath, imdbId: ep.imdbId, watchedAt: todayISO(),
    }, ...history]);
    setNewEpisodes(prev => prev.filter(e => !(e.entryId === ep.entryId && e.key === ep.key)));
  }

  const TABS = ["All", "Watching", "Watchlist", "Completed", "Dropped"];
  const libraryEntries = entries.filter(e => {
    const tabMatch = libraryFilter === "All" || e.status === libraryFilter;
    const searchMatch = e.title.toLowerCase().includes(search.toLowerCase());
    return tabMatch && searchMatch;
  });
  const counts = {};
  TABS.forEach(t => { counts[t] = t === "All" ? entries.length : entries.filter(e => e.status === t).length; });

  if (!loaded) return (
    <div style={{ background: "#0D1117", minHeight: "100vh", display: "flex", alignItems: "center",
      justifyContent: "center", color: "#8B949E", fontFamily: "system-ui, sans-serif" }}>
      Loading...
    </div>
  );

  return (
    <div style={{ background: "#0D1117", minHeight: "100vh", fontFamily: "system-ui, -apple-system, sans-serif", color: "#F0F6FC" }}>
      <div className="app-header" style={{ borderBottom: "1px solid #21262D", padding: "20px 24px 0" }}>
        <div style={{ maxWidth: 860, margin: "0 auto" }}>
          <div className="header-row" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span className="app-logo" style={{ fontSize: 26 }}>📺</span>
              <h1 className="app-title" style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em" }}>
                TV <span style={{ color: "#E5A000" }}>Tracker</span>
              </h1>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setSettingsOpen(true)} style={{
                background: "none", border: "1px solid #30363D", color: "#8B949E",
                borderRadius: 8, padding: "8px 10px", fontSize: 14, cursor: "pointer",
              }}>⚙</button>
              <button className="add-title-btn" onClick={() => setModal("add")} style={{
                background: "#E5A000", border: "none", color: "#0D1117",
                borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 700, cursor: "pointer",
              }}>+ Add Title</button>
            </div>
          </div>

          <div style={{ display: "flex", gap: 0 }}>
            {["Home", "Library", "History"].map(t => (
              <button key={t} className="tab-btn" onClick={() => setTab(t)} style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "8px 14px", fontSize: 13, fontWeight: tab === t ? 700 : 400,
                color: tab === t ? "#F0F6FC" : "#8B949E",
                borderBottom: `2px solid ${tab === t ? "#E5A000" : "transparent"}`,
              }}>
                {t}
                {t === "Home" && newEpisodes.length > 0 && (
                  <span style={{ marginLeft: 5, fontSize: 10, background: "#F85149", color: "#fff",
                    borderRadius: 10, padding: "1px 6px" }}>{newEpisodes.length}</span>
                )}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="content-container" style={{ maxWidth: 860, margin: "0 auto", padding: "20px 24px 60px" }}>
        {tab === "Home" && (
          <HomeTab
            entries={entries}
            apiKey={apiKey}
            newEpisodes={newEpisodes}
            refreshing={refreshing}
            onRefresh={refreshNewEpisodes}
            onMarkWatched={markEpisodeWatchedFromHome}
            onOpenSettings={() => setSettingsOpen(true)}
            lastChecked={lastChecked}
          />
        )}

        {tab === "Library" && (
          <>
            <input
              placeholder="Search titles..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{
                width: "100%", background: "#161B22", border: "1px solid #30363D",
                borderRadius: 10, color: "#F0F6FC", padding: "10px 14px", fontSize: 14,
                outline: "none", marginBottom: 14, boxSizing: "border-box", fontFamily: "inherit",
              }}
            />
            <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
              {TABS.map(t => (
                <button key={t} onClick={() => setLibraryFilter(t)} style={{
                  background: libraryFilter === t ? "#21262D" : "none",
                  border: "1px solid #30363D", color: libraryFilter === t ? "#F0F6FC" : "#8B949E",
                  borderRadius: 7, padding: "6px 12px", fontSize: 12, cursor: "pointer",
                }}>{t} {counts[t] > 0 && `(${counts[t]})`}</button>
              ))}
            </div>

            {libraryEntries.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#8B949E" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>🎬</div>
                <p style={{ margin: 0, fontSize: 15, fontWeight: 600, color: "#F0F6FC" }}>Nothing here yet</p>
                <p style={{ margin: "6px 0 20px", fontSize: 13 }}>
                  {search ? "Try a different search." : "Add a title to start tracking."}
                </p>
                {!search && (
                  <button onClick={() => setModal("add")} style={{
                    background: "#E5A000", border: "none", color: "#0D1117",
                    borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 700, cursor: "pointer",
                  }}>+ Add Title</button>
                )}
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 10 }}>
                {libraryEntries.map(entry => (
                  <EntryCard key={entry.id} entry={entry} onEdit={e => setModal(e)} />
                ))}
              </div>
            )}
          </>
        )}

        {tab === "History" && <HistoryTab history={history} onSync={syncHistory} syncMessage={syncMessage} />}

        <p className="footer-note" style={{ marginTop: 40, fontSize: 10, color: "#484F58", textAlign: "center" }}>
          This product uses the TMDB API but is not endorsed or certified by TMDB.
        </p>
      </div>

      {modal && (
        <Modal
          entry={modal === "add" ? null : modal}
          apiKey={apiKey}
          onClose={() => setModal(null)}
          onSave={handleSave}
          onDelete={handleDelete}
        />
      )}

      {settingsOpen && (
        <SettingsModal apiKey={apiKey} onSave={saveApiKey} onClose={() => setSettingsOpen(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TVTracker />);
</script>
